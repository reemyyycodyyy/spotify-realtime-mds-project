spotify_mds_project:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: /opt/airflow/dbt_transformation/spotify_data.db  # Inside the container volume
      extensions:
        - httpfs
      settings:
        s3_endpoint: 'minio:9000'          # Connects container-to-container (use port 9000 for API, not 9002 UI)
        s3_access_key_id: 'admin'
        s3_secret_access_key: 'password123'
        s3_use_ssl: false
        s3_url_style: 'path'